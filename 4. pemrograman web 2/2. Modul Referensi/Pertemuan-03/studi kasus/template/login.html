<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — TokoKita</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
      }
      .auth-card {
        background: #fff;
        border-radius: 1rem;
        padding: 2.5rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="auth-card">
            <div class="text-center mb-4">
              <h2 class="fw-bold">
                Toko<span style="color: #f59e0b">Kita</span>
              </h2>
              <p class="text-muted">Masuk ke akun Anda</p>
            </div>
            <form>
              <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input
                  type="email"
                  class="form-control form-control-lg"
                  placeholder="email@contoh.com"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input
                  type="password"
                  class="form-control form-control-lg"
                  placeholder="Masukkan password"
                  required
                />
              </div>
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" /><label
                    class="form-check-label"
                    >Ingat Saya</label
                  >
                </div>
                <a href="#" class="text-primary small">Lupa Password?</a>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                Masuk
              </button>
            </form>
            <hr class="my-4" />
            <p class="text-center text-muted mb-0">
              Belum punya akun?
              <a href="register.html" class="fw-bold text-primary"
                >Daftar Sekarang</a
              >
            </p>
            <p class="text-center mt-2">
              <a href="admin/index.html" class="text-muted small"
                >Login sebagai Admin →</a
              >
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
