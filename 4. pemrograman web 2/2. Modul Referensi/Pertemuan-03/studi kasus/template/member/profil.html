<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Member — TokoKita</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-light bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand" href="../index.html">Toko<span>Kita</span></a>
        <div class="d-flex gap-3 align-items-center">
          <a
            href="../cart.html"
            class="cart-icon text-dark text-decoration-none"
            >🛒 <span class="cart-badge" style="display: none">0</span></a
          >
          <div class="dropdown">
            <button
              class="btn btn-outline-primary btn-sm dropdown-toggle"
              data-bs-toggle="dropdown"
            >
              👤 Andi S.
            </button>
            <ul class="dropdown-menu">
              <li>
                <a class="dropdown-item" href="profil.html">Profil Saya</a>
              </li>
              <li>
                <a class="dropdown-item" href="pesanan.html">Pesanan Saya</a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a class="dropdown-item text-danger" href="../login.html"
                  >Logout</a
                >
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row g-4">
        <!-- Sidebar Menu -->
        <div class="col-md-3">
          <div class="card border-0 shadow-sm">
            <div class="card-body text-center py-4">
              <div style="font-size: 3.5rem">👤</div>
              <h6 class="fw-bold mt-2">Andi Setiawan</h6>
              <small class="text-muted">andi@gmail.com</small>
            </div>
            <div class="list-group list-group-flush">
              <a
                href="profil.html"
                class="list-group-item list-group-item-action active"
                >👤 Profil Saya</a
              >
              <a
                href="pesanan.html"
                class="list-group-item list-group-item-action"
                >🧾 Pesanan Saya</a
              >
              <a
                href="alamat.html"
                class="list-group-item list-group-item-action"
                >📍 Alamat</a
              >
              <a
                href="../login.html"
                class="list-group-item list-group-item-action text-danger"
                >🚪 Logout</a
              >
            </div>
          </div>
        </div>

        <!-- Konten Profil -->
        <div class="col-md-9">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-4">✏️ Edit Profil</h5>
              <form>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Nama Lengkap</label>
                    <input
                      type="text"
                      class="form-control"
                      value="Andi Setiawan"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input
                      type="email"
                      class="form-control"
                      value="andi@gmail.com"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">No. HP</label>
                    <input
                      type="tel"
                      class="form-control"
                      value="081234567890"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Kota</label>
                    <input type="text" class="form-control" value="Jakarta" />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Alamat</label>
                    <textarea class="form-control" rows="2">
Jl. Merdeka No.1</textarea
                    >
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-primary">
                      💾 Simpan Perubahan
                    </button>
                  </div>
                </div>
              </form>
              <hr class="my-4" />
              <h5 class="fw-bold mb-3">🔒 Ganti Password</h5>
              <form>
                <div class="row g-3">
                  <div class="col-md-4">
                    <label class="form-label">Password Lama</label>
                    <input
                      type="password"
                      class="form-control"
                      placeholder="••••••••"
                    />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Password Baru</label>
                    <input
                      type="password"
                      class="form-control"
                      placeholder="••••••••"
                    />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Konfirmasi</label>
                    <input
                      type="password"
                      class="form-control"
                      placeholder="••••••••"
                    />
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-outline-danger">
                      🔑 Ganti Password
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <!-- Pesanan Terakhir -->
          <div class="card border-0 shadow-sm mt-4">
            <div class="card-body">
              <div class="d-flex justify-content-between mb-3">
                <h6 class="fw-bold mb-0">🧾 Pesanan Terakhir</h6>
                <a href="pesanan.html" class="text-primary small"
                  >Lihat Semua →</a
                >
              </div>
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Kode</th>
                    <th>Tanggal</th>
                    <th>Total</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><code>TK-20250101-0001</code></td>
                    <td>1 Jan 2025</td>
                    <td>Rp 7.364.000</td>
                    <td>
                      <span class="status-badge status-selesai">Selesai</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
