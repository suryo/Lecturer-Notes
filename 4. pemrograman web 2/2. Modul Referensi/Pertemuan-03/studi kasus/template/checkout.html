<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — TokoKita</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-light bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="index.html">Toko<span>Kita</span></a>
      </div>
    </nav>

    <div class="container py-5">
      <h2 class="fw-bold mb-4">🛒 Checkout</h2>

      <div class="row g-4">
        <!-- Form Kiri -->
        <div class="col-lg-8">
          <!-- Alamat Pengiriman -->
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
              <h5 class="fw-bold mb-3">📍 Alamat Pengiriman</h5>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Nama Penerima</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Nama lengkap"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">No. Telepon</label>
                  <input
                    type="tel"
                    class="form-control"
                    placeholder="08xx-xxxx-xxxx"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label">Alamat Lengkap</label>
                  <textarea
                    class="form-control"
                    rows="2"
                    placeholder="Jl. nama jalan, no rumah, RT/RW"
                    required
                  ></textarea>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Kota</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Kota/Kabupaten"
                    required
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Provinsi</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Provinsi"
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Kode Pos</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Kode Pos"
                  />
                </div>
              </div>
            </div>
          </div>

          <!-- Metode Pengiriman -->
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
              <h5 class="fw-bold mb-3">🚚 Metode Pengiriman</h5>
              <div class="list-group">
                <label class="list-group-item list-group-item-action">
                  <input
                    class="form-check-input me-2"
                    type="radio"
                    name="kurir"
                    checked
                  />
                  <strong>JNE REG</strong> — Estimasi 3-5 hari ·
                  <strong>Rp 15.000</strong>
                </label>
                <label class="list-group-item list-group-item-action">
                  <input
                    class="form-check-input me-2"
                    type="radio"
                    name="kurir"
                  />
                  <strong>J&T Express</strong> — Estimasi 2-4 hari ·
                  <strong>Rp 18.000</strong>
                </label>
                <label class="list-group-item list-group-item-action">
                  <input
                    class="form-check-input me-2"
                    type="radio"
                    name="kurir"
                  />
                  <strong>SiCepat Halu</strong> — Estimasi 1-2 hari ·
                  <strong>Rp 25.000</strong>
                </label>
              </div>
            </div>
          </div>

          <!-- Metode Pembayaran -->
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h5 class="fw-bold mb-3">💳 Metode Pembayaran</h5>
              <div class="list-group">
                <label class="list-group-item list-group-item-action">
                  <input
                    class="form-check-input me-2"
                    type="radio"
                    name="bayar"
                    checked
                  />
                  🏦 <strong>Transfer BCA</strong> — a.n. PT TokoKita Indonesia
                </label>
                <label class="list-group-item list-group-item-action">
                  <input
                    class="form-check-input me-2"
                    type="radio"
                    name="bayar"
                  />
                  🏦 <strong>Transfer Mandiri</strong>
                </label>
                <label class="list-group-item list-group-item-action">
                  <input
                    class="form-check-input me-2"
                    type="radio"
                    name="bayar"
                  />
                  📱 <strong>QRIS</strong> (GoPay, OVO, Dana, dll)
                </label>
                <label class="list-group-item list-group-item-action">
                  <input
                    class="form-check-input me-2"
                    type="radio"
                    name="bayar"
                  />
                  💵 <strong>COD</strong> (Bayar di Tempat)
                </label>
              </div>
              <div class="mt-3">
                <label class="form-label"
                  >Catatan untuk Penjual (opsional)</label
                >
                <textarea
                  class="form-control"
                  rows="2"
                  placeholder="Contoh: tolong bungkus rapi ya..."
                ></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- Ringkasan Pesanan -->
        <div class="col-lg-4">
          <div class="checkout-summary">
            <h5 class="fw-bold mb-3">📦 Ringkasan Pesanan</h5>
            <div class="mb-3">
              <div class="d-flex gap-2 mb-2">
                <img
                  src="https://via.placeholder.com/60"
                  class="rounded"
                  alt=""
                />
                <div>
                  <div class="fw-semibold small">Laptop ASUS VivoBook 15</div>
                  <small class="text-muted">1 × Rp 6.999.000</small>
                </div>
              </div>
            </div>
            <hr />
            <div class="d-flex justify-content-between mb-2">
              <span>Subtotal</span><strong>Rp 6.999.000</strong>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Ongkir (JNE REG)</span><strong>Rp 15.000</strong>
            </div>
            <div class="d-flex justify-content-between mb-2 text-success">
              <span>Diskon</span><strong>- Rp 0</strong>
            </div>
            <div class="d-flex justify-content-between total-row">
              <span>Total Bayar</span
              ><strong class="text-primary fs-5">Rp 7.014.000</strong>
            </div>
            <button class="btn btn-primary w-100 mt-3 py-2 fw-bold">
              ✅ Buat Pesanan
            </button>
            <a href="cart.html" class="btn btn-outline-secondary w-100 mt-2"
              >← Kembali ke Keranjang</a
            >
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
