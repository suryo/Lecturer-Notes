<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keranjang Belanja — TokoKita</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-light bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">Toko<span>Kita</span></a>
        <a href="cart.html" class="cart-icon text-dark text-decoration-none"
          >🛒 <span class="cart-badge" style="display: none">0</span></a
        >
      </div>
    </nav>

    <div class="container py-5">
      <h2 class="fw-bold mb-4">🛒 Keranjang Belanja</h2>
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>#</th>
                    <th>Produk</th>
                    <th>Jumlah</th>
                    <th>Harga</th>
                    <th>Subtotal</th>
                    <th>Hapus</th>
                  </tr>
                </thead>
                <tbody id="cartBody">
                  <tr>
                    <td colspan="6" class="text-center py-5 text-muted">
                      Keranjang kosong.
                      <a href="produk.html">Belanja sekarang!</a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="checkout-summary">
            <h6 class="fw-bold mb-3">Ringkasan</h6>
            <div id="cartSummary"></div>
            <a href="checkout.html" class="btn btn-primary w-100 mt-3 fw-bold"
              >Lanjut ke Checkout →</a
            >
            <a href="produk.html" class="btn btn-outline-secondary w-100 mt-2"
              >← Lanjut Belanja</a
            >
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
      renderCartTable();
    </script>
  </body>
</html>
